<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الترفيه - السريع نت</title>
    <link rel="stylesheet" href="../css/style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>

<body>
    <div class="liquid-bg"></div>
    <div class="container" style="padding-bottom: 100px;">
        <header class="reveal" style="text-align: center; margin-bottom: 30px;">
            <h1 style="font-size: 28px; font-weight: 900; color: var(--dark);">منطقة الترفيه</h1>
            <p style="color: var(--secondary); font-weight: 700;">ألعاب وتطبيقات مختارة لك</p>
        </header>

        <!-- 1. Games Section -->
        <h2 style="font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
            <span
                style="background: var(--p1); color: white; padding: 5px 10px; border-radius: 10px; font-size: 12px;">ألعاب</span>
            <span>الأكثر طلباً</span>
        </h2>
        <div class="widget-grid reveal" style="grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px;">
            <!-- PUBG -->
            <div class="vibrant-card" style="padding: 15px; text-align: center;">
                <img src="https://cdn-icons-png.flaticon.com/512/3408/3408506.png"
                    style="width: 50px; margin-bottom: 10px;">
                <div style="font-weight: 800; font-size: 14px;">PUBG Mobile</div>
                <a href="https://www.pubgmobile.com/" target="_blank" class="p-btn"
                    style="margin-top: 10px; font-size: 12px; height: 35px; text-decoration: none; display: flex; align-items: center; justify-content: center;">تحميل</a>
            </div>
            <!-- Ludo -->
            <div class="vibrant-card" style="padding: 15px; text-align: center;">
                <img src="https://cdn-icons-png.flaticon.com/512/2376/2376176.png"
                    style="width: 50px; margin-bottom: 10px;">
                <div style="font-weight: 800; font-size: 14px;">Ludo Star</div>
                <a href="https://play.google.com/store/apps/details?id=com.superking.ludo.star&hl=ar" target="_blank"
                    class="p-btn"
                    style="margin-top: 10px; font-size: 12px; height: 35px; background: #6366f1; text-decoration: none; display: flex; align-items: center; justify-content: center;">لعب</a>
            </div>
        </div>

        <!-- 2. Sports Section -->
        <h2 style="font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
            <span
                style="background: var(--p3); color: white; padding: 5px 10px; border-radius: 10px; font-size: 12px;">رياضة</span>
            <span>القنوات والمباريات</span>
        </h2>
        <div class="widget-grid reveal" style="grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px;">
            <div class="vibrant-card" style="padding: 15px; text-align: center;">
                <div style="font-size: 40px; margin-bottom: 5px;">⚽</div>
                <div style="font-weight: 800; font-size: 14px;">BeIN Sports</div>
                <a href="https://www.bein.com/ar/" target="_blank" class="p-btn"
                    style="margin-top: 10px; font-size: 12px; height: 35px; background: #5b21b6; text-decoration: none; display: flex; align-items: center; justify-content: center;">مشاهدة</a>
            </div>
            <div class="vibrant-card" style="padding: 15px; text-align: center;">
                <div style="font-size: 40px; margin-bottom: 5px;">🥅</div>
                <div style="font-weight: 800; font-size: 14px;">Koora</div>
                <a href="https://www.kooora.com/" target="_blank" class="p-btn"
                    style="margin-top: 10px; font-size: 12px; height: 35px; background: #166534; text-decoration: none; display: flex; align-items: center; justify-content: center;">نتائج</a>
            </div>
        </div>

        <!-- 3. Kids & Cartoons -->
        <h2 style="font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
            <span
                style="background: var(--p4); color: white; padding: 5px 10px; border-radius: 10px; font-size: 12px;">أطفال</span>
            <span>كرتون ومرح</span>
        </h2>
        <div class="widget-grid reveal" style="grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px;">
            <div class="vibrant-card" style="padding: 15px; text-align: center;">
                <div style="font-size: 40px; margin-bottom: 5px;">🚀</div>
                <div style="font-weight: 800; font-size: 14px;">Spacetoon</div>
                <a href="https://spacetoon.com/" target="_blank" class="p-btn"
                    style="margin-top: 10px; font-size: 12px; height: 35px; background: #fca5a5; color: #7f1d1d; text-decoration: none; display: flex; align-items: center; justify-content: center;">مشاهدة</a>
            </div>
            <div class="vibrant-card" style="padding: 15px; text-align: center;">
                <div style="font-size: 40px; margin-bottom: 5px;">🧸</div>
                <div style="font-weight: 800; font-size: 14px;">YouTube Kids</div>
                <a href="https://www.youtubekids.com/" target="_blank" class="p-btn"
                    style="margin-top: 10px; font-size: 12px; height: 35px; background: #ef4444; text-decoration: none; display: flex; align-items: center; justify-content: center;">فتح</a>
            </div>
        </div>

        <!-- 4. Series & Movies -->
        <h2 style="font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
            <span
                style="background: var(--p2); color: white; padding: 5px 10px; border-radius: 10px; font-size: 12px;">ترفيه</span>
            <span>مسلسلات وأفلام</span>
        </h2>
        <div class="widget-grid reveal" style="grid-template-columns: repeat(2, 1fr); gap: 15px;">
            <div class="vibrant-card" style="padding: 15px; text-align: center;">
                <div style="font-size: 40px; margin-bottom: 5px;">🎬</div>
                <div style="font-weight: 800; font-size: 14px;">Shahid</div>
                <a href="https://shahid.mbc.net/" target="_blank" class="p-btn"
                    style="margin-top: 10px; font-size: 12px; height: 35px; background: #1e3a8a; text-decoration: none; display: flex; align-items: center; justify-content: center;">مشاهدة</a>
            </div>
            <div class="vibrant-card" style="padding: 15px; text-align: center;">
                <div style="font-size: 40px; margin-bottom: 5px;">🍿</div>
                <div style="font-weight: 800; font-size: 14px;">Netflix</div>
                <a href="https://www.netflix.com/" target="_blank" class="p-btn"
                    style="margin-top: 10px; font-size: 12px; height: 35px; background: #000; color: #e50914; text-decoration: none; display: flex; align-items: center; justify-content: center;">دخول</a>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="../login.html">
            <ion-icon name="home-outline"></ion-icon>
            <span>الرئيسية</span>
        </a>
        <a href="pricing.html">
            <ion-icon name="speedometer-outline"></ion-icon>
            <span>السرعات</span>
        </a>
        <a href="games.html" class="active">
            <ion-icon name="game-controller"></ion-icon>
            <span>ترفيه</span>
        </a>
        <a href="contact.html">
            <ion-icon name="call-outline"></ion-icon>
            <span>دعم</span>
        </a>
    </nav>
</body>

</html>
